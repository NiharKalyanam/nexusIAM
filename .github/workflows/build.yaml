name: NexusIAM CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  build:
    name: Build & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show repo structure
        run: find . -not -path './.git/*' -type f | head -50

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Find and install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
            npm audit --audit-level=high || true
            npm test --if-present
            npm run build --if-present
          elif [ -f nexusiam/package.json ]; then
            cd nexusiam && npm install
            npm audit --audit-level=high || true
            npm test --if-present
            npm run build --if-present
          else
            echo "No package.json found - printing repo structure for debugging"
            find . -name "package.json" -not -path "./.git/*"
          fi