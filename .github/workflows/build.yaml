name: NexusIAM CI

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Print Directory
        run: |
          pwd
          ls -la
          ls -la ../

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show Node Version
        run: npm --version